name: Piperly
options:
  bundleIdPrefix: com.piperly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

packages:
  ReadiumSwiftToolkit:
    url: https://github.com/readium/swift-toolkit
    from: "3.2.0"

schemes:
  Piperly:
    build:
      targets:
        Piperly: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PiperlyTests
        - PiperlyUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Piperly:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Piperly
        excludes:
          - "Info.plist"
    resources:
      - path: Piperly/Resources/reader-theme.css
      - path: Piperly/Resources/word-tap.js
      - path: Piperly/Resources/PrivacyInfo.xcprivacy
    info:
      path: Piperly/Info.plist
      properties:
        CFBundleDisplayName: Piperly
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportsDocumentBrowser: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "Piperly connects to your book server to browse and download books."
        CFBundleDocumentTypes:
          - CFBundleTypeName: EPUB
            LSItemContentTypes:
              - org.idpf.epub-container
            LSHandlerRank: Alternate
        UTImportedTypeDeclarations:
          - UTTypeConformsTo:
              - public.composite-content
            UTTypeDescription: EPUB Publication
            UTTypeIdentifier: org.idpf.epub-container
            UTTypeTagSpecification:
              public.filename-extension:
                - epub
              public.mime-type:
                - application/epub+zip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.piperly.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Piperly/Info.plist
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7CNK4YPCQX
        INFOPLIST_KEY_CFBundleDisplayName: Piperly
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        SWIFT_STRICT_CONCURRENCY: complete
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/sh
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
    dependencies:
      - package: ReadiumSwiftToolkit
        product: ReadiumShared
      - package: ReadiumSwiftToolkit
        product: ReadiumStreamer
      - package: ReadiumSwiftToolkit
        product: ReadiumNavigator
      - package: ReadiumSwiftToolkit
        product: ReadiumOPDS

  PiperlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PiperlyTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - target: Piperly

  PiperlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PiperlyUITests
    postBuildScripts:
      - name: Configure UI Test Runner Launch Screen
        basedOnDependencyAnalysis: false
        shell: /bin/sh
        script: |
          for runner_info_plist in \
            "${TARGET_BUILD_DIR}/../Info.plist" \
            "${TARGET_BUILD_DIR}/PiperlyUITests-Runner.app/Info.plist" \
            "${BUILT_PRODUCTS_DIR}/PiperlyUITests-Runner.app/Info.plist"
          do
            if [ -f "${runner_info_plist}" ]; then
              /usr/libexec/PlistBuddy -c "Delete :UILaunchScreen" "${runner_info_plist}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "${runner_info_plist}"
              /usr/libexec/PlistBuddy -c "Add :UILaunchScreen:UIColorName string LaunchBackground" "${runner_info_plist}"
              /usr/libexec/PlistBuddy -c "Add :UILaunchScreen:UIImageName string LaunchAppIcon" "${runner_info_plist}"
            fi
          done

          test_app_assets=""
          for candidate_assets in \
            "${BUILT_PRODUCTS_DIR}/${TEST_TARGET_NAME}.app/Assets.car" \
            "${TARGET_BUILD_DIR}/${TEST_TARGET_NAME}.app/Assets.car" \
            "${BUILT_PRODUCTS_DIR}/Piperly.app/Assets.car" \
            "${TARGET_BUILD_DIR}/Piperly.app/Assets.car"
          do
            if [ -z "${test_app_assets}" ] && [ -f "${candidate_assets}" ]; then
              test_app_assets="${candidate_assets}"
            fi
          done

          if [ -n "${test_app_assets}" ]; then
            for runner_assets in \
              "${TARGET_BUILD_DIR}/../Assets.car" \
              "${TARGET_BUILD_DIR}/PiperlyUITests-Runner.app/Assets.car" \
              "${BUILT_PRODUCTS_DIR}/PiperlyUITests-Runner.app/Assets.car"
            do
              if [ -d "$(dirname "${runner_assets}")" ]; then
                cp "${test_app_assets}" "${runner_assets}"
              fi
            done
          fi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - target: Piperly
