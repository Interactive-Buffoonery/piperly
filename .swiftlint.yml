# SwiftLint configuration for Piperly
# Swift 6.0 / SwiftUI / iPad app

included:
  - Piperly
  - PiperlyTests
  - PiperlyUITests

excluded:
  - .build
  - DerivedData

# Disable rules that clash with Swift 6 concurrency or SwiftUI patterns
disabled_rules:
  - trailing_comma          # trailing commas are fine
  - opening_brace           # SwiftUI DSL style doesn't always match
  - todo                    # we use TODO/FIXME as real markers
  - blanket_disable_command # allow targeted swiftlint:disable

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - overridden_super_call
  - private_action
  - private_outlet
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

# Tweak thresholds to be practical, not pedantic
line_length:
  warning: 150
  error: 250
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 400
  error: 700

function_body_length:
  warning: 60
  error: 120

function_parameter_count:
  warning: 6
  error: 8

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - r
    - g
    - b
    - t
    - ok

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60

large_tuple:
  warning: 4
  error: 5

nesting:
  type_level: 3
  function_level: 5
