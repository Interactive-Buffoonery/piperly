name: Piperly
options:
  bundleIdPrefix: com.piperly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  ReadiumSwiftToolkit:
    url: https://github.com/readium/swift-toolkit
    from: "3.2.0"

targets:
  Piperly:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Piperly
        excludes:
          - "Info.plist"
    resources:
      - path: Piperly/Resources/reader-theme.css
      - path: Piperly/Resources/word-tap.js
    info:
      path: Piperly/Info.plist
      properties:
        CFBundleDisplayName: Piperly
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportsDocumentBrowser: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "Piperly connects to your book server to browse and download books."
        CFBundleDocumentTypes:
          - CFBundleTypeName: EPUB
            LSItemContentTypes:
              - org.idpf.epub-container
            LSHandlerRank: Alternate
        UTImportedTypeDeclarations:
          - UTTypeConformsTo:
              - public.composite-content
            UTTypeDescription: EPUB Publication
            UTTypeIdentifier: org.idpf.epub-container
            UTTypeTagSpecification:
              public.filename-extension:
                - epub
              public.mime-type:
                - application/epub+zip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.piperly.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Piperly/Info.plist
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: ReadiumSwiftToolkit
        product: ReadiumShared
      - package: ReadiumSwiftToolkit
        product: ReadiumStreamer
      - package: ReadiumSwiftToolkit
        product: ReadiumNavigator
      - package: ReadiumSwiftToolkit
        product: ReadiumOPDS

  PiperlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PiperlyTests
    dependencies:
      - target: Piperly

  PiperlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PiperlyUITests
    dependencies:
      - target: Piperly
